<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
    <style>
        body{
            font-family: Georgia, 'Times New Roman', Times, serif;
            background-color:darkcyan ;
            display: flex;
        }

        .product{
            border: 1px solid brown;
            color: green;
            width: 300px;
            overflow: hidden;
            text-align: center;
            margin: 30px;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 4px 4px 12px rgb(80, 55, 79);
            background-color: burlywood;   
        }

        .product img{
            object-fit: cover;
            width: 100%;
            height: 300px;
            border-radius: 30%;
        }

        button{
             background-color: black;
             padding: 15px;
             border: none;
             border-radius: 15px;
             color:aquamarine;
             cursor: pointer;
             font-family: cursive;
        }

        .product:hover{
            transform: scale(1.02);
            transition: 1.5s;
            color: darkblue;
        }
    </style>
</head>
<body>

    <!--Content - Any type of content - text, image, video, audio, form, etc -->
    
    <div class="product">
        <img src="https://images.pexels.com/photos/11216260/pexels-photo-11216260.jpeg">
        <h2>Mobile</h2>
        <p>$50</p>
        <button>Add To Cart</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/13323678/pexels-photo-13323678.jpeg">
        <h2>laptop</h2>
        <p>$70</p>
        <button>Add To Cart</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/186037/pexels-photo-186037.jpeg">
        <h2>Shoes</h2>
        <p>$15</p>
        <button>Add To Cart</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/8132514/pexels-photo-8132514.jpeg">
        <h2>Head Phone</h2>
        <P>$10</P>
        <button>Add To Cart</button>
    </div>
</body>
</html>
